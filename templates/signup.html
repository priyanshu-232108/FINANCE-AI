{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-logo">◈</span>
            <h1>Create Account</h1>
            <p>Start tracking your finances with smart insights</p>
        </div>
        <form method="POST" action="{{ url_for('signup') }}" class="auth-form" id="signup-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min 6 characters" required autocomplete="new-password" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
                <span>Create Account</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
